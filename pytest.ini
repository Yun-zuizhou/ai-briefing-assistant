[pytest]
testpaths = tests
python_files = test_*.py
cache_dir = _archive_workspace/runtime-cache/pytest/cache
norecursedirs =
    .git
    .hg
    .svn
    .tox
    .venv
    __pycache__
    .pytest_cache
    .pydeps
    .pydeps_runtime
    .trae
    _archive_workspace
    暂未整理
    prototype
    prototype-vintage-backup
    pytest-cache-files-*
addopts = --basetemp=_archive_workspace/runtime-cache/pytest/tmp -p no:cacheprovider
