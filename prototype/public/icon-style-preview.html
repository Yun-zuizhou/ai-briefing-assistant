<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标风格预览</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F1E8;
      --fg: #1A1612;
      --muted: #6B6358;
      --accent: #8B2500;
      --gold: #B8860B;
      --topic-ai: #1E3A5F;
      --topic-work: #2D5A27;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: linear-gradient(135deg, #2C2416 0%, #3D3425 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: #D4C8B0;
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.2em;
    }

    .subtitle {
      color: #A8A29E;
      text-align: center;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .style-section {
      background: var(--bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid #D4CFC2;
    }

    .style-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
    }

    .style-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .icons-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .icon-card {
      text-align: center;
    }

    .icon-wrapper {
      width: 48px;
      height: 48px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-label {
      font-size: 11px;
      color: var(--muted);
    }

    /* Style 1: 金色边框风 */
    .style-1 .icon-wrapper {
      position: relative;
    }

    .style-1 .icon-frame {
      position: absolute;
      width: 48px;
      height: 48px;
    }

    .style-1 .icon-inner {
      position: relative;
      z-index: 1;
    }

    /* Style 2: 报纸印刷风 */
    .style-2 .icon-wrapper {
      position: relative;
    }

    .style-2 .print-texture {
      position: absolute;
      width: 48px;
      height: 48px;
    }

    .style-2 .print-main {
      position: relative;
      z-index: 1;
    }

    /* Style 3: 几何装饰风 */
    .style-3 .geometric-icon {
      position: relative;
    }

    .style-3 .geometric-bg {
      position: absolute;
      top: 0;
      left: 0;
    }

    .style-3 .geometric-main {
      position: relative;
      z-index: 1;
    }

    /* Style 4: 双色装饰风 */
    .style-4 svg {
      display: block;
    }
  </style>
</head>
